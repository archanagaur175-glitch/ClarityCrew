name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'

      - name: Inject Firebase Android config
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "Creating google-services.json from secret..."
            echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > android/app/google-services.json
          else
            echo "WARNING: GOOGLE_SERVICES_JSON secret not set. Creating placeholder for build."
            echo "{\"project_info\":{\"project_number\":\"0\",\"project_id\":\"placeholder\"},\"client\":[{\"client_info\":{\"mobilesdk_app_id\":\"1:0:android:0000000000000000\",\"android_client_info\":{\"package_name\":\"com.example.claritycrew\"}}}]}" > android/app/google-services.json
          fi

      - run: flutter pub get

      - run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: claritycrew-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
