name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'

      - name: Inject Firebase Android config
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > android/app/google-services.json
            echo "google-services.json created from secret."
          else
            echo "WARNING: GOOGLE_SERVICES_JSON secret not set. Firebase init will fall back to bundled JSON."
          fi

      - run: flutter pub get

      - run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: claritycrew-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
