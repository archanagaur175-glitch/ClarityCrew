name: Ingest Kolibri Content

on:
  workflow_dispatch:
    inputs:
      retry_failed:
        description: 'Retry previously failed imports only'
        required: false
        default: 'false'

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install firebase-admin

      - name: Run Kolibri ingestion
        run: node tool/ingest/ingest_kolibri.cjs
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          KOLIBRI_BASE_URL: https://contentworkshop.learningequality.org/api/public/v1
          RETRY_FAILED: ${{ github.event.inputs.retry_failed == 'true' && 'true' || 'false' }}

      - run: echo "Ingestion complete."
